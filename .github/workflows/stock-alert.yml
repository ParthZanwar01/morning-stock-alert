name: Morning Stock Alert
on:
  schedule:
    - cron: '30 12 * * 1-5'  # 7:30 AM CDT (UTC-5)
  workflow_dispatch:
jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run stock alert
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python stock_alert.py
